name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ansible-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Ansible collections
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: collections-${{ hashFiles('ansible/collections/requirements.yml') }}
          restore-keys: |
            collections-

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/collections/requirements.yml

      - name: Write vault password file
        env:
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
        run: echo "$VAULT_PASSWORD" > ~/.vault_pass

      - name: Run ansible-lint
        working-directory: ansible
        env:
          ANSIBLE_VAULT_PASSWORD_FILE: ~/.vault_pass
          ANSIBLE_INVENTORY: inventory/hosts.yml
        run: ansible-lint
