---
- name: Configure UFW firewall
  hosts: all
  become: true

  tasks:
    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow Node Exporter
      community.general.ufw:
        rule: allow
        port: "9100"
        proto: tcp

    - name: Set default incoming policy to deny
      community.general.ufw:
        default: deny
        direction: incoming

    - name: Set default outgoing policy to allow
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: Enable UFW
      community.general.ufw:
        state: enabled

- name: Open monitoring ports on monitoring VM
  hosts: monitoring
  become: true

  tasks:
    - name: Allow Prometheus
      community.general.ufw:
        rule: allow
        port: "9090"
        proto: tcp

    - name: Allow Grafana
      community.general.ufw:
        rule: allow
        port: "3000"
        proto: tcp