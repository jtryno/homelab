---
- name: Deploy Prometheus and Grafana on monitoring-01
  hosts: monitoring
  become: true

  vars_files:
    - ../group_vars/all/secrets.yml

  tasks:
    - name: Create config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /opt/monitoring
        - /opt/monitoring/prometheus/config
        - /opt/monitoring/grafana/provisioning/datasources

    - name: Deploy Prometheus config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/prometheus.yml.j2"
        dest: /opt/monitoring/prometheus/config/prometheus.yml
        owner: root
        group: root
        mode: "0644"
      notify: Restart monitoring stack

    - name: Deploy Grafana datasource provisioning
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/grafana_datasource.yml.j2"
        dest: /opt/monitoring/grafana/provisioning/datasources/prometheus.yml
        owner: root
        group: root
        mode: "0644"
      notify: Restart monitoring stack

    - name: Deploy Docker Compose file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/docker-compose.monitoring.yml.j2"
        dest: /opt/monitoring/docker-compose.yml
        owner: root
        group: root
        mode: "0644"
      notify: Restart monitoring stack

    - name: Open Prometheus port in UFW
      community.general.ufw:
        rule: allow
        port: "9090"
        proto: tcp

    - name: Open Grafana port in UFW
      community.general.ufw:
        rule: allow
        port: "3000"
        proto: tcp

    - name: Start monitoring stack
      community.docker.docker_compose_v2:
        project_src: /opt/monitoring
        state: present
        pull: always

  handlers:
    - name: Restart monitoring stack
      community.docker.docker_compose_v2:
        project_src: /opt/monitoring
        state: restarted
