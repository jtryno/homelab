---
- name: Deploy Node Exporter
  hosts: all
  become: true
  vars:
    node_exporter_version: "1.11.1" # Newest version is 1.11.1 as of 06/05/2026
    node_exporter_user: node_exporter
    node_exporter_port: 9100
    node_exporter_base_url: "https://github.com/prometheus/node_exporter/releases/download"

  tasks:
    - name: Create node_exporter system user
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        system: true
        shell: /sbin/nologin
        create_home: false

    - name: Download Node Exporter tarball
      ansible.builtin.get_url:
        url: "{{ node_exporter_base_url }}/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        mode: "0644"

    - name: Extract Node Exporter tarball
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/
        remote_src: true

    - name: Install Node Exporter binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        owner: "{{ node_exporter_user }}"
        group: "{{ node_exporter_user }}"
        mode: "0755"
        remote_src: true

    - name: Deploy systemd unit file
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User={{ node_exporter_user }}
          Group={{ node_exporter_user }}
          Type=simple
          ExecStart=/usr/local/bin/node_exporter
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start node_exporter service
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started

    - name: Allow Node Exporter port through ufw
      community.general.ufw:
        rule: allow
        port: "{{ node_exporter_port }}"
        proto: tcp
