---
- name: Base server setup
  hosts: all
  become: true
  vars_files:
    - ~/homelab/ansible/group_vars/all/main.yml
    - ~/homelab/ansible/group_vars/all/secrets.yml
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - htop
          - net-tools
          - unzip
        state: present

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: true
