---
- name: Create semaphore deploy directory
  ansible.builtin.file:
    path: "{{ semaphore_deploy_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ semaphore_deploy_path }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart semaphore

- name: Deploy .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ semaphore_deploy_path }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart semaphore

- name: Allow Semaphore port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ semaphore_port }}"
    proto: tcp

- name: Start Semaphore stack
  community.docker.docker_compose_v2:
    project_src: "{{ semaphore_deploy_path }}"
    state: present
    pull: always
