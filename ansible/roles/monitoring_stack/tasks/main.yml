---
- name: Create config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/monitoring
    - /opt/monitoring/prometheus/config
    - /opt/monitoring/grafana/provisioning/datasources
    - /opt/monitoring/alertmanager/config

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /opt/monitoring/prometheus/config/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Prometheus alert rules
  ansible.builtin.copy:
    src: alert.rules.yml
    dest: /opt/monitoring/prometheus/config/alert.rules.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /opt/monitoring/alertmanager/config/alertmanager.yml
    owner: root
    group: nogroup
    mode: "0640"
  notify: Restart monitoring stack

- name: Deploy Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana_datasource.yml.j2
    dest: /opt/monitoring/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Docker Compose file
  ansible.builtin.template:
    src: docker-compose.monitoring.yml.j2
    dest: /opt/monitoring/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

- name: Allow Prometheus from Ansible controller only
  community.general.ufw:
    rule: allow
    src: "{{ monitoring_stack_prometheus_allowed_src }}"
    port: "9090"
    proto: tcp

- name: Allow Alertmanager from Ansible controller only
  community.general.ufw:
    rule: allow
    src: "{{ monitoring_stack_prometheus_allowed_src }}"
    port: "9093"
    proto: tcp

- name: Allow Grafana
  community.general.ufw:
    rule: allow
    port: "3000"
    proto: tcp

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    state: present
    pull: always
