---
- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  # noqa: args[module]

- name: Allow Node Exporter
  community.general.ufw:
    rule: allow
    port: "9100"
    proto: tcp

- name: Set default incoming policy to deny
  community.general.ufw:
    default: deny
    direction: incoming
  # noqa: args[module]

- name: Set default outgoing policy to allow
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Enable UFW
  community.general.ufw:
    state: enabled
